{% extends 'base.html' %}
{% block title %}Pay Fine{% endblock %}
{% block content %}
<h2>Pay Fine</h2>
<p>Transaction #{{ txn.id }} · Amount: ₹{{ txn.fine }}</p>
<button id="rzp-button1" class="btn btn-success">Pay with Razorpay</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  const options = {
    key: '{{ razorpay_key_id }}',
    amount: '{{ order.amount }}',
    currency: 'INR',
    name: 'LibraryMS',
    description: 'Fine payment',
    order_id: '{{ order.id }}',
    handler: function (response){
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = '/library/payment/callback/?txn_id={{ txn.id }}';
      const add = (k,v) => { const i=document.createElement('input'); i.type='hidden'; i.name=k; i.value=v; form.appendChild(i); };
      add('csrfmiddlewaretoken', '{{ csrf_token }}');
      add('razorpay_payment_id', response.razorpay_payment_id);
      add('razorpay_order_id', response.razorpay_order_id);
      add('razorpay_signature', response.razorpay_signature);
      document.body.appendChild(form);
      form.submit();
    },
    prefill: {
      name: '{{ request.user.get_full_name|default:request.user.username }}',
      email: '{{ request.user.email }}'
    },
    theme: { color: '#0d6efd' }
  };
  document.getElementById('rzp-button1').onclick = function(e){
    e.preventDefault();
    const rzp1 = new Razorpay(options);
    rzp1.open();
  }
</script>
{% endblock %}
